name: Publish npm package

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run verification without publishing"
        required: true
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  publish:
    name: Verify and publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Inspect package
        run: npm pack --dry-run

      - name: Publish to npm
        if: github.event_name == 'push' || inputs.dry_run == false
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
